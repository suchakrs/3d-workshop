<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>01-2 · Transform matrices — drag & read the matrix</title>
    <link rel="stylesheet" href="../../src/styles/base.css" />
    <style>
      /* Page-local styling for the matrix readout (kept out of shared base.css) */
      .matrix-panel {
        position: fixed;
        left: 12px;
        bottom: 12px;
        padding: 12px 14px;
        background: rgba(0, 0, 0, 0.62);
        border-radius: 8px;
        backdrop-filter: blur(4px);
        font: 12px/1.4 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        min-width: 320px;
      }
      .matrix-panel h2 {
        margin: 0 0 8px;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        opacity: 0.7;
      }
      .matrix-panel .mode {
        color: #ffcc66;
        font-weight: 600;
      }
      table.mat {
        border-collapse: collapse;
        margin: 4px 0 10px;
      }
      table.mat td {
        width: 64px;
        padding: 3px 6px;
        text-align: right;
        font-variant-numeric: tabular-nums;
        border: 1px solid rgba(255, 255, 255, 0.08);
        transition: background 0.15s, color 0.15s;
      }
      /* Highlight which part of the matrix the active gizmo mode drives */
      td.hl-trans { background: rgba(125, 180, 255, 0.28); color: #cfe4ff; }
      td.hl-rs { background: rgba(143, 220, 143, 0.22); color: #d7f5d7; }
      .decomp { display: grid; grid-template-columns: auto 1fr; gap: 2px 10px; }
      .decomp .k { opacity: 0.6; }
      .decomp .v { font-variant-numeric: tabular-nums; }
      .matrix-panel .which {
        margin-top: 8px;
        opacity: 0.7;
        font-family: system-ui, sans-serif;
      }
    </style>
  </head>
  <body>
    <div class="stage"><canvas id="c"></canvas></div>

    <div class="overlay">
      <h1>01-2 · Transform matrices</h1>
      <p>Drag the <strong>gizmo</strong> on the cube. Watch the 4×4 matrix update.</p>
      <p>
        Keys: <code>W</code> move · <code>E</code> rotate · <code>R</code> scale ·
        <code>Q</code> toggle local/world space
      </p>
    </div>

    <div class="matrix-panel" id="panel">
      <h2>Local matrix · mode: <span class="mode" id="mode">translate</span></h2>
      <table class="mat" id="mat"></table>
      <div class="decomp" id="decomp"></div>
      <div class="which" id="which"></div>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
